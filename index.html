
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Chuyển Đổi Định Dạng Lớp Học</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px 3px; /* 3px hai bên biên */
            padding: 0;
            background-color: #121212; 
            color: #e0e0e0; 
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e1e; 
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            border: 1px solid #2d2d2d;
        }
        h2 {
            text-align: center;
            color: #ffffff;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            background-color: #2d2d2d; 
            color: #ffffff; 
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover {
            background-color: #3498db;
        }
        .output-container {
            margin-top: 20px;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            background-color: #27ae60;
            margin-top: 0;
        }
        .copy-btn:hover {
            background-color: #2ecc71;
        }
        pre {
            background-color: #000000; 
            color: #a6e22e; 
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 100px;
            line-height: 1.5;
            border: 1px solid #2d2d2d;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tool Định Dạng Danh Sách Học Viên</h2>
    <p><strong>Dán dữ liệu vào đây:</strong></p>
    <textarea id="inputText" placeholder="Nhập dữ liệu vào đây..."></textarea>
    
    <button onclick="processData()">CHUYỂN ĐỔI</button>

    <div class="output-container">
        <p><strong>Kết quả:</strong></p>
        <button class="copy-btn" onclick="copyToClipboard()">Copy Kết Quả</button>
        <pre id="outputText">Kết quả sẽ hiển thị ở đây...</pre>
    </div>
</div>

<script>
function processData() {
    const input = document.getElementById('inputText').value.trim();
    if (!input) {
        alert('Vui lòng nhập dữ liệu!');
        return;
    }

    const lines = input.split('\n').map(line => line.trim()).filter(line => line.length > 0);
    if (lines.length < 3) {
        alert('Dữ liệu không đúng định dạng!');
        return;
    }

    // Dòng 1: Thông tin lớp và GV
    let infoLine = lines[0];
    infoLine = infoLine.replace(/^([A-Za-z0-9\s-]+)\s+(.+)$/, function(match, p1, p2) {
        return p1.trim() + " / " + p2.trim();
    });

    // Dòng 2: Lịch học
    const scheduleLine = lines[1];
    
    // Tìm mã phòng học (Ví dụ: T3-30, T2-58)
    const roomMatch = scheduleLine.match(/(T\d+-\d+)/);
    const room = roomMatch ? roomMatch[1] : "";

    // Tìm các ngày học linh hoạt theo số bạn nhập (3-5 hoặc 4-6)
    const days = [];
    const cleanSchedule = scheduleLine.replace(/\s+/g, ''); // Xóa khoảng trắng để check chính xác
    
    if (cleanSchedule.includes('3-5') || cleanSchedule.includes('3+5')) {
        days.push('thứ 3', 'thứ 5');
    } else if (cleanSchedule.includes('4-6') || cleanSchedule.includes('4+6')) {
        days.push('thứ 4', 'thứ 6');
    } else {
        // Dự phòng nếu quét lẻ chữ cái
        const lower = cleanSchedule.toLowerCase();
        if (lower.includes('t3')) days.push('thứ 3');
        if (lower.includes('t4')) days.push('thứ 4');
        if (lower.includes('t5')) days.push('thứ 5');
        if (lower.includes('t6')) days.push('thứ 6');
    }
    
    // Nếu vẫn không quét được gì thì mặc định là thứ 3 và thứ 5
    if (days.length === 0) days.push('thứ 3', 'thứ 5');

    // Các mốc giờ cố định
    const timeSlots = ["18h00", "18h30", "18h45"];

    // Từ dòng 3 trở đi là danh sách học viên
    const studentLines = lines.slice(2);
    const formattedStudents = [];

    studentLines.forEach(name => {
        // Tách các tên cá biệt
        if (name === "Lê Gia Lĩnh") {
            formattedStudents.push("Lê Gia");
            formattedStudents.push("Linh");
        } else if (name === "Lưu Thiên Nhân") {
            formattedStudents.push("Lưu Thiên");
            formattedStudents.push("Nhân");
        } else {
            formattedStudents.push(name);
        }
    });

    // Tạo chuỗi kết quả
    let blocks = [];

    days.forEach(day => {
        timeSlots.forEach(time => {
            const key = `"${infoLine} ${day} ${room} ${time}"`;
            
            // Format danh sách học viên thụt lề 12 dấu cách
            const studentArrayString = formattedStudents.map(student => `            "${student}"`).join(",\n");
            
            // Ghép thành 1 block
            const block = `${key}: [\n${studentArrayString}\n        ]`;
            blocks.push(block);
        });
    });

    // Kết nối các phần và tạo khoảng cách xa
    const finalString = blocks.join(",\n\n        ");

    document.getElementById('outputText').innerText = finalString;
}

function copyToClipboard() {
    const text = document.getElementById('outputText').innerText;
    if (text === "Kết quả sẽ hiển thị ở đây..." || !text) {
        alert('Chưa có kết quả để copy!');
        return;
    }
    navigator.clipboard.writeText(text).then(() => {
        alert('Đã copy thành công vào bộ nhớ tạm!');
    }).catch(err => {
        alert('Lỗi khi copy: ' + err);
    });
}
</script>

</body>
</html>
